<!DOCTYPE html>
<html>
<head>
    <title>Moon Orbit Simulation</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden;
        }
        canvas { 
            display: block; 
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 120px;
        }
        .slider-container {
            margin-top: 10px;
            padding: 10px;
            border-top: 1px solid #666;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        button {
            padding: 5px 10px;
            margin: 5px 0;
            cursor: pointer;
        }
        input[type="number"] {
            width: 80px;
        }
        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <script src="bundle.js"></script>
</body>
</html>
