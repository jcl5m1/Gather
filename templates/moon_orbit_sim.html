<!DOCTYPE html>
<html>
<head>
    <title>Moon Orbit Simulation</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 120px;
        }
        .slider-container {
            margin-top: 10px;
            padding: 10px;
            border-top: 1px solid #666;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="controls">
        <div id="orbitType" style="background: rgba(255,255,255,0.2); padding: 5px; margin-bottom: 10px; text-align: center;">
            Orbit Type: Unknown
        </div>
        <div class="control-group">
            <h3>Moon Parameters</h3>
            <div>
                <label>Position X:</label>
                <input type="number" id="posX" value="15" step="1">
            </div>
            <div>
                <label>Position Y:</label>
                <input type="number" id="posY" value="0" step="1">
            </div>
            <div>
                <label>Position Z:</label>
                <input type="number" id="posZ" value="0" step="1">
            </div>
            <div>
                <label>Velocity X:</label>
                <input type="number" id="velX" value="0" step="0.1">
            </div>
            <div>
                <label>Velocity Y:</label>
                <input type="number" id="velY" value="10.0" step="0.1">
            </div>
            <div>
                <label>Velocity Z:</label>
                <input type="number" id="velZ" value="0" step="0.1">
            </div>
            <div>
                <label>Mass:</label>
                <input type="number" id="mass" value="0.1" step="0.1">
            </div>
        </div>
        <button onclick="resetSimulation()">Reset Simulation</button>
        <div class="slider-container">
            <div class="slider-label">
                <span>Time Scale: </span>
                <span id="timeScaleValue">1.0x</span>
            </div>
            <input type="range" id="timeScale" min="1" max="1000" step="0.1" value="1" style="width: 100%">
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Constants
        const G = 1; // Simplified gravitational constant for visualization
        const SCALE = 1; // Scale factor for visualization
        let timeScale = 1.0; // Time scale multiplier

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Planet
        const planetGeometry = new THREE.SphereGeometry(2, 32, 32);
        const planetMaterial = new THREE.MeshPhongMaterial({ color: 0x3366cc });
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        scene.add(planet);

        // Moons
        const moonGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const moon1Material = new THREE.MeshPhongMaterial({ color: 0xcccccc });
        const moon2Material = new THREE.MeshPhongMaterial({ color: 0xff9999 });
        const moon1 = new THREE.Mesh(moonGeometry, moon1Material);
        const moon2 = new THREE.Mesh(moonGeometry, moon2Material);
        scene.add(moon1);
        scene.add(moon2);

        // Periapsis and Apoapsis markers (unlit)
        const markerGeometry = new THREE.SphereGeometry(0.2, 16, 16);
        const periapsisMarker = new THREE.Mesh(
            markerGeometry,
            new THREE.MeshBasicMaterial({ color: 0x00ff00 })
        );
        const apoapsisMarker = new THREE.Mesh(
            markerGeometry,
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        scene.add(periapsisMarker);
        scene.add(apoapsisMarker);

        // Orbit trail lines
        const orbit1Geometry = new THREE.BufferGeometry();
        const orbit2Geometry = new THREE.BufferGeometry();
        const orbit1Material = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5 });
        const orbit2Material = new THREE.LineBasicMaterial({ color: 0xff9999, opacity: 0.5 });
        const orbit1Line = new THREE.Line(orbit1Geometry, orbit1Material);
        const orbit2Line = new THREE.Line(orbit2Geometry, orbit2Material);
        scene.add(orbit1Line);
        scene.add(orbit2Line);

        // Idealized elliptical orbit line
        const idealOrbitGeometry = new THREE.BufferGeometry();
        const idealOrbitMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffff, 
            opacity: 0.8,
            transparent: true 
        });
        const idealOrbitLine = new THREE.Line(idealOrbitGeometry, idealOrbitMaterial);
        scene.add(idealOrbitLine);

        // Camera position
        camera.position.set(30, 20, 30);
        camera.lookAt(scene.position);

        // Moon states
        let moon1State = {
            position: new THREE.Vector3(),
            velocity: new THREE.Vector3(),
            mass: 0.1
        };

        let moon2State = {
            position: new THREE.Vector3(),
            velocity: new THREE.Vector3(),
            mass: 0.1,
            initialPos: new THREE.Vector3(),
            initialVel: new THREE.Vector3(),
            orbitParams: {
                a: 0,        // semi-major axis
                e: 0,        // eccentricity
                period: 0,   // orbital period
                startTime: 0 // time reference for orbit calculation
            }
        };

        // Planet state
        const planetState = {
            position: new THREE.Vector3(0, 0, 0),
            mass: 1000 // Much larger than moon for stable orbit
        };

        // Function to calculate initial eccentric anomaly
        function calculateInitialE(initialPos, initialVel, a, e, mu) {
            // Calculate specific angular momentum vector
            const h = new THREE.Vector3().crossVectors(initialPos, initialVel);
            
            // Calculate radius and velocity magnitudes
            const r = initialPos.length();
            const v = initialVel.length();
            
            // Calculate radial velocity component
            const radialVel = initialVel.dot(initialPos.clone().normalize());
            
            // Calculate true anomaly directly from position and velocity
            const theta = Math.atan2(
                h.length() * radialVel,
                h.length() * h.length() / r - mu
            );
            
            // Convert true anomaly to eccentric anomaly
            // Handle the quadrant correctly based on radial velocity
            const E = 2 * Math.atan(Math.sqrt((1 - e) / (1 + e)) * Math.tan(theta / 2));
            return E;
        }

        // Function to calculate position on elliptical orbit
        function calculateEllipticalPosition(time, a, e, period, startTime, initialPos, initialVel) {
            const mu = G * planetState.mass;
            const E0 = calculateInitialE(initialPos, initialVel, a, e, mu);
            
            // Mean anomaly at t=0
            const M0 = E0 - e * Math.sin(E0);
            
            // Current mean anomaly
            const M = M0 + 2 * Math.PI * ((time - startTime) / period);
            
            // Solve Kepler's equation iteratively (M = E - e*sin(E))
            let E = M; // Initial guess
            for(let i = 0; i < 10; i++) {
                E = M + e * Math.sin(E);
            }
            
            // Calculate position in orbital plane coordinates
            const x = a * (Math.cos(E) - e);
            const y = a * Math.sqrt(1 - e*e) * Math.sin(E);
            
            // Calculate orbit orientation vectors
            const h = new THREE.Vector3().crossVectors(initialPos, initialVel);
            const hNorm = h.clone().normalize();
            
            // Calculate eccentricity vector
            const vCrossH = new THREE.Vector3().crossVectors(initialVel, h);
            const eVec = vCrossH.multiplyScalar(1/mu).sub(initialPos.clone().normalize());
            const eNorm = eVec.clone().normalize();
            
            // Calculate orbit plane basis vectors
            const periapsisDir = eNorm;
            const perpDir = new THREE.Vector3().crossVectors(hNorm, periapsisDir).normalize();
            
            // Transform from orbital plane to 3D space
            const position = new THREE.Vector3();
            position.addScaledVector(periapsisDir, x);
            position.addScaledVector(perpDir, y);
            
            return position;
        }

        // Generate points for an elliptical orbit
        function generateEllipsePoints(a, e, h, eVec) {
            const points = [];
            const numPoints = 100;
            const b = a * Math.sqrt(1 - e * e); // semi-minor axis
            const c = a * e; // distance from center to focus

            // Normalize vectors
            const hNorm = h.clone().normalize();
            const eNorm = eVec.clone().normalize();
            
            // Calculate orbit plane basis vectors
            const periapsisDir = eNorm;
            const perpDir = new THREE.Vector3().crossVectors(hNorm, periapsisDir).normalize();
            
            // Calculate center of ellipse (offset from focus by -c along periapsis direction)
            const center = periapsisDir.clone().multiplyScalar(-c);
            
            // Generate ellipse points in the orbit plane
            for (let i = 0; i <= numPoints; i++) {
                const theta = (i / numPoints) * Math.PI * 2;
                
                // Calculate point relative to ellipse center
                const point = new THREE.Vector3();
                point.addScaledVector(periapsisDir, a * Math.cos(theta));
                point.addScaledVector(perpDir, b * Math.sin(theta));
                
                // Add center offset to get final point
                point.add(center);
                
                points.push(point);
            }
            
            return points;
        }

        // Time scale slider
        const timeScaleSlider = document.getElementById('timeScale');
        const timeScaleValue = document.getElementById('timeScaleValue');
        
        timeScaleSlider.addEventListener('input', function(e) {
            timeScale = parseFloat(e.target.value);
            timeScaleValue.textContent = timeScale.toFixed(1) + 'x';
        });

        // Add event listener for Enter key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                resetSimulation();
            }
        });

        function calculateOrbitType() {
            // Calculate specific orbital energy
            const v = moon1State.velocity.length();
            const r = moon1State.position.length();
            const mu = G * planetState.mass;
            const specificEnergy = (v * v / 2) - (mu / r);
            
            const orbitTypeDiv = document.getElementById('orbitType');
            if (specificEnergy < 0) {
                // Calculate orbital parameters for elliptical orbit
                const pos = moon1State.position.clone();
                const vel = moon1State.velocity.clone();
                
                // Calculate specific angular momentum (h = r × v)
                const h = new THREE.Vector3().crossVectors(pos, vel);
                
                // Calculate eccentricity vector
                const hMag = h.length();
                const vMag = vel.length();
                const rMag = pos.length();
                
                // e = ((v × h)/μ) - (r/|r|)
                const vCrossH = new THREE.Vector3().crossVectors(vel, h);
                const eVec = vCrossH.multiplyScalar(1/mu).sub(pos.normalize());
                const e = eVec.length();
                
                // Calculate semi-major axis
                const a = -mu / (2 * specificEnergy);
                
                // Calculate periapsis and apoapsis distances
                const periapsisDistance = a * (1 - e);
                const apoapsisDistance = a * (1 + e);
                
                // Update markers and ideal orbit
                if (e < 1) { // Only show markers for valid elliptical orbits
                    // Get the direction of eccentricity vector for periapsis
                    const periapsisDir = eVec.normalize();
                    const apoapsisDir = periapsisDir.clone().multiplyScalar(-1);
                    
                    periapsisMarker.position.copy(periapsisDir.multiplyScalar(periapsisDistance));
                    apoapsisMarker.position.copy(apoapsisDir.multiplyScalar(apoapsisDistance));
                    
                    periapsisMarker.visible = true;
                    apoapsisMarker.visible = true;

                    // Generate and update ideal elliptical orbit
                    const ellipsePoints = generateEllipsePoints(a, e, h, eVec);
                    idealOrbitGeometry.setFromPoints(ellipsePoints);
                    idealOrbitLine.visible = true;
                    
                    orbitTypeDiv.innerHTML = `Orbit Type: Elliptical<br>
                        Semi-major axis: ${a.toFixed(2)}<br>
                        Eccentricity: ${e.toFixed(3)}<br>
                        Periapsis: ${periapsisDistance.toFixed(2)}<br>
                        Apoapsis: ${apoapsisDistance.toFixed(2)}`;
                } else {
                    periapsisMarker.visible = false;
                    apoapsisMarker.visible = false;
                    idealOrbitLine.visible = false;
                    orbitTypeDiv.textContent = 'Orbit Type: Elliptical (near parabolic)';
                }
                orbitTypeDiv.style.color = '#90EE90'; // Light green
            } else if (specificEnergy > 0) {
                periapsisMarker.visible = false;
                apoapsisMarker.visible = false;
                idealOrbitLine.visible = false;
                orbitTypeDiv.textContent = 'Orbit Type: Hyperbolic';
                orbitTypeDiv.style.color = '#FFB6C1'; // Light red
            } else {
                periapsisMarker.visible = false;
                apoapsisMarker.visible = false;
                idealOrbitLine.visible = false;
                orbitTypeDiv.textContent = 'Orbit Type: Parabolic';
                orbitTypeDiv.style.color = '#ADD8E6'; // Light blue
            }
        }

        function resetSimulation() {
            // Get values from inputs
            const pos = new THREE.Vector3(
                parseFloat(document.getElementById('posX').value),
                parseFloat(document.getElementById('posY').value),
                parseFloat(document.getElementById('posZ').value)
            );
            const vel = new THREE.Vector3(
                parseFloat(document.getElementById('velX').value),
                parseFloat(document.getElementById('velY').value),
                parseFloat(document.getElementById('velZ').value)
            );
            const mass = parseFloat(document.getElementById('mass').value);

            // Set states for both moons
            moon1State.position.copy(pos);
            moon1State.velocity.copy(vel);
            moon1State.mass = mass;

            moon2State.position.copy(pos);
            moon2State.velocity.copy(vel);
            moon2State.mass = mass;
            moon2State.initialPos.copy(pos);
            moon2State.initialVel.copy(vel);

            // Calculate orbital parameters for moon2
            const mu = G * planetState.mass;
            const r = pos.length();
            const v = vel.length();
            const h = new THREE.Vector3().crossVectors(pos, vel).length();
            
            // Calculate orbital elements
            const specificEnergy = (v * v / 2) - (mu / r);
            const a = -mu / (2 * specificEnergy);
            const e = Math.sqrt(1 + (2 * specificEnergy * h * h) / (mu * mu));
            const period = 2 * Math.PI * Math.sqrt(Math.pow(a, 3) / mu);

            moon2State.orbitParams = {
                a: a,
                e: e,
                period: period,
                startTime: 0
            };

            // Clear orbit trails
            orbit1Points.length = 0;
            orbit2Points.length = 0;
            orbit1Geometry.setFromPoints([pos]);
            orbit2Geometry.setFromPoints([pos]);

            // Reset current time
            currentTime = 0;

            // Calculate and display orbit type
            calculateOrbitType();
        }

        // Animation variables
        const dt = 0.001; // Base time step
        const orbit1Points = [];
        const orbit2Points = [];
        const maxOrbitPoints = 5000; // Increased to show more of the orbit
        let currentTime = 0;

        function updateOrbit() {
            // Apply time scale to simulation steps
            const scaledDt = dt * timeScale;
            currentTime += scaledDt;
            
            // Update moon1 using numerical integration
            const r = moon1State.position.clone().sub(planetState.position);
            const distance = r.length();
            
            // Prevent division by zero and extreme forces at very small distances
            if (distance >= 2.5) {
                const force = r.normalize().multiplyScalar(
                    -G * moon1State.mass * planetState.mass / (distance * distance)
                );

                // Update velocity and position using Euler integration
                moon1State.velocity.add(force.multiplyScalar(scaledDt / moon1State.mass));
                moon1State.position.add(moon1State.velocity.clone().multiplyScalar(scaledDt));
            }

            // Update moon2 using analytical solution
            moon2State.position = calculateEllipticalPosition(
                currentTime,
                moon2State.orbitParams.a,
                moon2State.orbitParams.e,
                moon2State.orbitParams.period,
                moon2State.orbitParams.startTime,
                moon2State.initialPos,
                moon2State.initialVel
            );

            // Update moon positions
            moon1.position.copy(moon1State.position);
            moon2.position.copy(moon2State.position);

            // Update orbit trails
            orbit1Points.push(moon1State.position.clone());
            orbit2Points.push(moon2State.position.clone());
            if (orbit1Points.length > maxOrbitPoints) orbit1Points.shift();
            if (orbit2Points.length > maxOrbitPoints) orbit2Points.shift();
            orbit1Geometry.setFromPoints(orbit1Points);
            orbit2Geometry.setFromPoints(orbit2Points);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateOrbit();
            controls.update(); // Update controls
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize simulation
        resetSimulation();
        animate();
    </script>
</body>
</html>
